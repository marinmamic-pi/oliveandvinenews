<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} — Olive &amp; Vine</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "400556ee679349f7be42fa2c65882099"}'></script>
    <!-- End Cloudflare Web Analytics -->
</head>
<body>
    <div class="container" style="max-width:720px; margin:0 auto; padding:2rem 1rem;">
        <a href="/" style="color:#5B7B3A; text-decoration:none; font-size:0.875rem;">&larr; Back to Olive &amp; Vine</a>
        <article>
            <h1 style="color:#2C2C2C; font-size:1.75rem; margin:1.5rem 0 0.5rem;">{{ .Title }}</h1>
            <p style="color:#888; font-size:0.875rem; margin-bottom:2rem;">{{ .Date.Format "January 2, 2006" }}</p>
            <div style="line-height:1.8; color:#333;">
                {{ .Content }}
            </div>
        </article>
    </div>
    <footer style="text-align:center; padding:2rem; color:#999; font-size:0.8rem; border-top:1px solid #eee; margin-top:3rem;">
        <p>&copy; 2026 Olive &amp; Vine</p>
    </footer>
</body>
</html>
